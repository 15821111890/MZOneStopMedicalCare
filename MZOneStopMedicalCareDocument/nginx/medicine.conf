# medicine.conf —— location 片段，**不要**包 server 块
#
# 架构（2026-04-20 重构后）：
#   - 默认 server 统一由 MZDocument/nginx/ip_default.conf 维护
#   - 本文件只提供医疗静态路由的 location，通过 `include /etc/nginx/snippets/medicine-h5.conf;`
#     被上层 server 块拉入
#
# 部署方式：
#   python3 MZOneStopMedicalCareDocument/script/deploy_restart_medical_project.python --all
#     -> 同步本文件到 /etc/nginx/snippets/medicine-h5.conf
#     -> nginx -t && systemctl reload nginx
#
# 路径：
#   /medicine-h5/client/      -> /home/ubuntu/apps/MZOneStopMedicalCare/MZOneStopMedicalCareClient/dist/
#   /medicine-h5/management/  -> /home/ubuntu/apps/MZOneStopMedicalCare/MZOneStopMedicalCareBusiness/dist/
#
# /api/medicine 走 ip_default.conf 的通用 /api/ → Gateway，此处 **不** 定义。

# C 端
location /medicine-h5/client/ {
    alias /home/ubuntu/apps/MZOneStopMedicalCare/MZOneStopMedicalCareClient/dist/;
    index index.html;
    try_files $uri $uri/ /medicine-h5/client/index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# B 端
location /medicine-h5/management/ {
    alias /home/ubuntu/apps/MZOneStopMedicalCare/MZOneStopMedicalCareBusiness/dist/;
    index index.html;
    try_files $uri $uri/ /medicine-h5/management/index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
