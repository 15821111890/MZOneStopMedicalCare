# Nginx 配置片段 —— MZOneStopMedicalCare
#
# 用法：将以下 location 块合并进现有 server 里（参考 MZDocument/nginx/mzai.conf）。
#       若是独立站点，直接复制 server { ... } 段落。
#
# 路径：
#   /medicine-h5/client/       -> /home/ubuntu/apps/MZOneStopMedicalCareClient/dist/
#   /medicine-h5/management/   -> /home/ubuntu/apps/MZOneStopMedicalCareBusiness/dist/
#   /api/medicine/             -> Gateway 127.0.0.1:3000 (由 Gateway 剥 /api/medicine 后转发到 127.0.0.1:3003)

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/medicine_access.log;
    error_log  /var/log/nginx/medicine_error.log;

    # C 端
    location /medicine-h5/client/ {
        alias /home/ubuntu/apps/MZOneStopMedicalCareClient/dist/;
        index index.html;
        try_files $uri $uri/ /medicine-h5/client/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # B 端
    location /medicine-h5/management/ {
        alias /home/ubuntu/apps/MZOneStopMedicalCareBusiness/dist/;
        index index.html;
        try_files $uri $uri/ /medicine-h5/management/index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API（经 Gateway）
    location /api/medicine/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 20m;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
